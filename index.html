<!doctype html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notes App</title>
    <script defer src="js/vue.js"></script>
    <script defer src="js/main.js"></script>
    <link rel="stylesheet" href="css/main.css">
</head>
<body>
    <div id="app">
    <h1>Notes App</h1>
    <div class="columns">
        <note-column 
            title="To Do"
            :cards="column1"
            column-type="todo"
            @add-card="addNewCard"
            @toggle-item="toggleItem"
            @change-color="changeCardColor">
        </note-column>
        
        <note-column 
            title="In Progress"
            :cards="column2"
            column-type="progress"
            @toggle-item="toggleItem"
            @change-color="changeCardColor">
        </note-column>
        
        <note-column 
            title="Done"
            :cards="column3"
            column-type="done"
            @toggle-item="toggleItem"
            @change-color="changeCardColor">
        </note-column>
    </div>
    </div>
</body>
</html>
